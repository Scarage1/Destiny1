# ruff configuration
# Fast Python linter and formatter — replaces flake8 + isort
[tool.ruff]
target-version = "py313"
line-length = 100
exclude = [
    ".venv",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
    "frontend",
    "data",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",   # line-too-long (handled by formatter)
    "B008",   # do not perform function calls in default arguments (FastAPI pattern)
    "SIM117", # allow nested withs
    "N806",   # G is canonical NetworkX graph variable name (convention, not a bug)
]
